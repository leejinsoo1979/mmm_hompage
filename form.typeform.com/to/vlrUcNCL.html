    <style>
        html,
        body,
        #root {
            position: relative;
            height: 100%;
            width: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            max-width: 100vw;
            z-index: 50;
        }

        @keyframes fadeIn {
            from {
                opacity: 0.01;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(20px);
            }
            to {
                transform: translateY(0);
            }
        }

        @keyframes slideOut {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-20px);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100vh);
            }
            to {
                transform: translateY(0);
            }
        }

        #close-screen {
            height: 100%;
            width: 100%;
        }

        #root-loader {
            height: 100%;
            width: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 40;
            color: transparent;
            fill: currentColor;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0.01;
            animation: 400ms ease-in-out 1 forwards fadeIn;
        }

        .root-loader-inner {
            position: relative;
        }

        #root-loader.out {
            animation: 400ms ease-in-out 400ms 1 forwards fadeOut;
            opacity: 1;
        }

        #loader-bar {
            height: auto;
            margin-top: 16px;
        }

        #loader-logo {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(20px);
            position: absolute;
            bottom: 20px;
            animation: 400ms ease-in-out 1 forwards slideIn;
        }

        #root-loader.out #loader-logo {
            animation: 400ms ease-in-out 400ms 1 forwards slideOut;
            transform: translateY(0);
        }

        @media (prefers-reduced-motion) {
            #loader-logo {
                transform: translateY(0);
                animation: 400ms ease-in-out 1 forwards fadeIn;
            }
            #root-loader.out #loader-logo {
                animation: 600ms ease-in-out 1 forwards fadeOut;
            }
        }

        .renderer-in {
            animation: 400ms ease-in-out 800ms 1 normal forwards running fadeIn;
            opacity: 1;
        }
    </style>
